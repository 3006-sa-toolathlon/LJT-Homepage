locale: en-US
site_theme: default
title: 'Junteng Liu'
title_separator: '-'
name: 'Junteng Liu'
description: 'Personal homepage of Junteng Liu'
url: https://3006-sa-toolathlon.github.io
baseurl: '/LJT-Homepage'
repository: '3006-sa-toolathlon/LJT-Homepage'

include:
  - .htaccess
  - _pages
  - files

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ''
      type: pages
    values:
      layout: single
      author_profile: false
  - scope:
      path: ''
      type: teaching
    values:
      layout: single
      author_profile: false
  - scope:
      path: ''
      type: publications
    values:
      layout: single
      author_profile: false
  - scope:
      path: ''
      type: portfolio
    values:
      layout: single
      author_profile: false
  - scope:
      path: ''
      type: talks
    values:
      layout: talk
      author_profile: false

markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
